<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Gestion Camion Pro</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div>
        <div class="brand-pill">🚛 Gestion Camion Pro</div>
        <p class="muted small" id="welcomeText">Chargement...</p>
      </div>
      <nav class="nav stack">
        <button class="nav-btn active" data-view="dashboard">Dashboard</button>
        <button class="nav-btn" data-view="camions">Camions</button>
        <button class="nav-btn" data-view="chauffeurs">Chauffeurs</button>
        <button class="nav-btn" data-view="voyages">Voyages</button>
        <button class="nav-btn" data-view="entretien">Entretien</button>
        <button class="nav-btn" data-view="depenses">Dépenses</button>
        <button class="nav-btn" data-view="documents">Documents</button>
        <button class="nav-btn" data-view="parametres">Paramètres</button>
      </nav>
      <button id="logoutBtn" class="btn danger">Déconnexion</button>
    </aside>
    <main class="main">
      <div class="topbar">
        <button id="menuBtn" class="btn secondary mobile-only">☰</button>
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <p class="muted">Gestion complète des camions, voyages, entretien et dépenses.</p>
        </div>
        <input id="globalSearch" class="search" placeholder="Recherche rapide...">
      </div>

      <section id="dashboardView" class="view active"></section>
      <section id="camionsView" class="view"></section>
      <section id="chauffeursView" class="view"></section>
      <section id="voyagesView" class="view"></section>
      <section id="entretienView" class="view"></section>
      <section id="depensesView" class="view"></section>
      <section id="documentsView" class="view"></section>
      <section id="parametresView" class="view"></section>
    </main>
  </div>
  <script type="module" src="../js/admin.js"></script>
</body>
</html>
