<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Gestion Camion Pro</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand-row">
          <span class="brand-badge">GC</span>
          <div>
            <strong>Gestion Camion</strong>
            <small>Administration</small>
          </div>
        </div>
        <button id="closeMenu" class="close-menu" aria-label="Fermer">✕</button>
      </div>

      <nav class="menu nav-list">
        <button class="menu-item nav-btn active" data-view="dashboard">Dashboard</button>
        <button class="menu-item nav-btn" data-view="trucks">Camions</button>
        <button class="menu-item nav-btn" data-view="drivers">Chauffeurs</button>
        <button class="menu-item nav-btn" data-view="trips">Voyages</button>
        <button class="menu-item nav-btn" data-view="maintenance">Entretien</button>
        <button class="menu-item nav-btn" data-view="expenses">Autres dépenses</button>
        <button class="menu-item nav-btn" data-view="settings">Réglages</button>
      </nav>

      <div class="sidebar-bottom">
        <button id="logoutBtn" class="btn danger w-full">Déconnexion</button>
      </div>
    </aside>

    <main class="main">
      <div class="mobile-topbar">
        <button id="menuToggle" class="menu-btn" aria-label="Ouvrir le menu">☰</button>
        <div class="mobile-title-box">
          <h1 id="pageTitleMobile">Dashboard</h1>
          <p class="muted" id="welcomeTextMobile">Chargement...</p>
        </div>
      </div>
      <div id="menuOverlay" class="menu-overlay"></div>

      <header class="topbar">
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <p class="muted" id="welcomeText">Chargement...</p>
        </div>
        <div class="topbar-actions" style="width:min(100%,380px)">
          <input id="globalSearch" class="search" placeholder="Recherche rapide..." />
        </div>
      </header>

      <section id="dashboardView" class="view active"></section>
      <section id="trucksView" class="view"></section>
      <section id="driversView" class="view"></section>
      <section id="tripsView" class="view"></section>
      <section id="maintenanceView" class="view"></section>
      <section id="expensesView" class="view"></section>
      <section id="settingsView" class="view"></section>
    </main>
  </div>

  <script type="module" src="../js/admin.js"></script>
</body>
</html>
