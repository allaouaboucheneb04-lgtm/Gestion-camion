<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Gestion Camion Algérie Pro</title>
  <link rel="stylesheet" href="../css/style.css?v=dz2" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <div class="brand-wrap">
          <div class="brand-mark small">GC</div>
          <div>
            <strong>Gestion Camion</strong>
            <small>Admin</small>
          </div>
        </div>
        <button class="icon-btn mobile-only" id="closeSidebar">✕</button>
      </div>

      <nav class="menu">
        <button class="menu-item active" data-view="dashboard">Dashboard</button>
        <button class="menu-item" data-view="camions">Camions</button>
        <button class="menu-item" data-view="chauffeurs">Chauffeurs</button>
        <button class="menu-item" data-view="voyages">Voyages</button>
        <button class="menu-item" data-view="entretien">Entretien</button>
        <button class="menu-item" data-view="depenses">Dépenses</button>
        <button class="menu-item" data-view="parametres">Paramètres</button>
      </nav>

      <div class="sidebar-foot">
        <button id="logoutBtn" class="btn danger w-full">Déconnexion</button>
      </div>
    </aside>

    <main class="main">
      <div class="mobile-head">
        <button class="icon-btn mobile-only" id="openSidebar">☰</button>
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <p class="muted" id="welcomeText">Chargement...</p>
        </div>
      </div>

      <section id="dashboardView" class="view active section-space"></section>
      <section id="camionsView" class="view section-space"></section>
      <section id="chauffeursView" class="view section-space"></section>
      <section id="voyagesView" class="view section-space"></section>
      <section id="entretienView" class="view section-space"></section>
      <section id="depensesView" class="view section-space"></section>
      <section id="parametresView" class="view section-space"></section>
    </main>
  </div>

  <script type="module" src="../js/admin.js?v=dz2"></script>
  <script type="module" src="../js/i18n.js?v=dz2"></script>
</body>
</html>
