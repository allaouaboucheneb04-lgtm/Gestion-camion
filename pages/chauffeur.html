<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chauffeur | Gestion Camion Pro</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="driver-shell">
    <header class="topbar">
      <div>
        <div class="brand-pill">🚛 Espace Chauffeur</div>
        <p class="muted" id="driverWelcome">Chargement...</p>
      </div>
      <button id="logoutBtn" class="btn danger">Déconnexion</button>
    </header>
    <section id="driverStats" class="stats-grid"></section>
    <div class="grid-2 mt16">
      <section class="card">
        <div class="section-title"><h2>Ajouter / modifier un voyage</h2><p class="muted">Le chauffeur gère seulement ses propres voyages.</p></div>
        <form id="driverTripForm" class="form-grid"></form>
      </section>
      <section class="card">
        <div class="section-title"><h2>Mes voyages</h2><p class="muted">Tu peux modifier, supprimer et joindre un document.</p></div>
        <div id="driverTripList" class="stack"></div>
      </section>
    </div>
  </div>
  <script type="module" src="../js/chauffeur.js"></script>
</body>
</html>
