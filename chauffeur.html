<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chauffeur - Gestion Camion Pro</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-layout compact">
    <main class="main-content full">
      <header class="page-header card">
        <div>
          <h1>Espace chauffeur</h1>
          <p class="muted">Consultez vos voyages et ajoutez vos informations autorisées.</p>
        </div>
        <div class="header-actions">
          <button id="installBtn" class="btn secondary hidden">Installer</button>
          <button id="logoutBtn" class="btn danger">Déconnexion</button>
        </div>
      </header>

      <section class="stats-grid two">
        <div class="stat-card card"><span>Mes voyages</span><strong id="myTripsCount">0</strong></div>
        <div class="stat-card card"><span>Mes revenus</span><strong id="myTripRevenue">0 $</strong></div>
      </section>

      <section class="two-cols">
        <div class="card">
          <div class="card-head"><h3>Ajouter un voyage</h3></div>
          <form id="voyageForm" class="grid-form">
            <input id="client" placeholder="Client" required />
            <input id="destination" placeholder="Destination" required />
            <input id="dateDepart" type="datetime-local" required />
            <input id="dateArrivee" type="datetime-local" required />
            <input id="prixCourse" type="number" step="0.01" placeholder="Prix de course" required />
            <input id="gasoil" type="number" step="0.01" placeholder="Gasoil" />
            <input id="fraisMission" type="number" step="0.01" placeholder="Frais mission" />
            <input id="kilometrage" type="number" step="1" placeholder="Kilométrage après 10 voyages" />
            <button class="btn primary" type="submit">Enregistrer</button>
          </form>
        </div>

        <div class="card">
          <div class="card-head"><h3>Mon profil</h3></div>
          <div id="profileBox" class="profile-box"></div>
        </div>
      </section>

      <section class="card">
        <div class="card-head"><h3>Mes voyages</h3></div>
        <div class="table-wrap"><table><thead><tr><th>Client</th><th>Destination</th><th>Prix</th><th>Date départ</th><th>Actions</th></tr></thead><tbody id="myTripsTable"></tbody></table></div>
      </section>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/chauffeur.js"></script>
</body>
</html>
