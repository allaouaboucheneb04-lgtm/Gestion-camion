<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestion Camion Algérie Pro</title>
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css?v=entreprise-finale1" />
</head>
<body class="auth-body">
  <div class="auth-wrap">
    <div class="auth-card card">
      <div class="brand-mark">GC</div>
      <h1>Gestion Camion Algérie Pro</h1>
      <p class="muted">Connexion admin / chauffeur — Algérie (DZD)</p>

      <form id="loginForm" class="stack">
        <label>
          <span>Email</span>
          <input id="email" type="email" placeholder="exemple@domaine.com" required />
        </label>

        <label>
          <span>Mot de passe</span>
          <input id="password" type="password" placeholder="••••••••" required />
        </label>

        <button class="btn primary" type="submit">Connexion</button>
        <button class="btn secondary" type="button" id="resetPasswordBtn">Mot de passe oublié / modifier</button>
        <div id="loginMessage" class="helper error"></div>
      </form>

      <div class="auth-info">
        <p><strong>Étapes Firebase :</strong></p>
        <ol>
          <li>Créer l'utilisateur dans Firebase Auth</li>
          <li>Créer le document <code>users/{uid}</code></li>
          <li>Ajouter le rôle <code>admin</code> ou <code>chauffeur</code></li>
        </ol>
      </div>
    </div>
  </div>

  <script type="module" src="js/login.js?v=entreprise-finale1"></script>
  <script type="module" src="js/i18n.js?v=entreprise-finale1"></script>
</body>
</html>
